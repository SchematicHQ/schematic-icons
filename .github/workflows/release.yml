name: Release

on:
  push:
    branches:
      - main
      - next

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: runs-on=${{ github.run_id }}/runner=1cpu-linux-arm64
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        registry-url: 'https://registry.npmjs.org'
    - run: yarn install
    - run: yarn lint
    - run: yarn build:all
    - name: Release to NPM and GitHub Package Registry
      run: yarn semantic-release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Disable npm provenance attestation: it requires a GitHub-hosted
        # runner and we use a self-hosted RunsOn runner. OIDC auth still works.
        NPM_CONFIG_PROVENANCE: "false"
